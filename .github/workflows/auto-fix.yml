# .github/workflows/auto-fix.yml
name: Autonomous Fix — Test Runner

on:
  workflow_dispatch:
    inputs:
      auto_fix_id:
        description: 'auto_fixes.id (UUID) — passed directly, no DB lookup needed'
        required: true
        type: string
      branch_name:
        description: 'Branch to checkout and test (e.g. fix/feedback-abc12345)'
        required: true
        type: string

jobs:
  test-fix-branch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install server dependencies
        run: cd server && npm install

      - name: Run tests on fix branch
        id: fix_tests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NODE_ENV: test
        run: |
          cd server
          npm test -- --no-coverage --json --outputFile=/tmp/fix-results.json 2>/dev/null || true
          FIX_PASSED=$(node -e "try{const r=require('/tmp/fix-results.json');console.log(r.numPassedTests||0)}catch(e){console.log(0)}")
          FIX_FAILED=$(node -e "try{const r=require('/tmp/fix-results.json');console.log(r.numFailedTests||0)}catch(e){console.log(0)}")
          FIX_SKIPPED=$(node -e "try{const r=require('/tmp/fix-results.json');console.log(r.numPendingTests||0)}catch(e){console.log(0)}")
          echo "passed=$FIX_PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FIX_FAILED" >> $GITHUB_OUTPUT
          echo "skipped=$FIX_SKIPPED" >> $GITHUB_OUTPUT
          echo "Fix branch: $FIX_PASSED passed, $FIX_FAILED failed"

      - name: Run tests on main branch (baseline)
        id: baseline_tests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NODE_ENV: test
        run: |
          # Fetch main explicitly — checkout is on fix branch so local main may not exist
          git fetch origin main 2>/dev/null || true
          # Use origin/main (remote tracking ref) for the worktree
          git worktree add /tmp/main-worktree origin/main 2>/dev/null || \
            git worktree add /tmp/main-worktree main 2>/dev/null || true
          if [ -d "/tmp/main-worktree/server" ]; then
            cd /tmp/main-worktree/server && npm install --silent 2>/dev/null
            npm test -- --no-coverage --json --outputFile=/tmp/baseline-results.json 2>/dev/null || true
            git -C /tmp/main-worktree/../.. worktree remove /tmp/main-worktree --force 2>/dev/null || true
            BASELINE_FAILED=$(node -e "try{const r=require('/tmp/baseline-results.json');console.log(r.numFailedTests||0)}catch(e){console.log(9999)}")
          else
            echo "WARNING: Could not create main worktree — using large baseline so fix branch passes"
            BASELINE_FAILED=9999
          fi
          echo "baseline_failed=$BASELINE_FAILED" >> $GITHUB_OUTPUT
          echo "Main baseline: $BASELINE_FAILED failed"

      - name: POST test results to Railway API
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          WORKFLOW_CALLBACK_SECRET: ${{ secrets.WORKFLOW_CALLBACK_SECRET }}
        run: |
          FIX_ID="${{ github.event.inputs.auto_fix_id }}"
          PASSED="${{ steps.fix_tests.outputs.passed }}"
          FAILED="${{ steps.fix_tests.outputs.failed }}"
          SKIPPED="${{ steps.fix_tests.outputs.skipped }}"
          BASELINE_FAILED="${{ steps.baseline_tests.outputs.baseline_failed }}"
          RUN_ID="${{ github.run_id }}"

          curl -s -X POST "${BASE_URL}/api/auto-fixes/${FIX_ID}/test-results" \
            -H "Content-Type: application/json" \
            -H "x-callback-secret: ${WORKFLOW_CALLBACK_SECRET}" \
            -d "{\"passed\":${PASSED},\"failed\":${FAILED},\"baseline_failed\":${BASELINE_FAILED},\"skipped\":${SKIPPED},\"workflow_run_id\":\"${RUN_ID}\"}" \
            | tee /tmp/callback-response.json

          echo "Callback response: $(cat /tmp/callback-response.json)"
          echo "Summary: fix branch ${FAILED} failed vs main baseline ${BASELINE_FAILED} failed"
