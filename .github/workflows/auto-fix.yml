name: Autonomous Fix Implementation

on:
  workflow_dispatch:
    inputs:
      feedback_id:
        description: 'Feedback ID to process'
        required: true
        type: string

jobs:
  run-agent-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Run Phase 10 agent cycle
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          BASE_URL: ${{ secrets.BASE_URL }}
          NODE_ENV: production
        run: |
          node -e "
          const db = require('./server/db');
          const { runDiagnosticAgent } = require('./server/agents/diagnostic-agent');
          const { runPlanningAgent } = require('./server/agents/planning-agent');
          const { runImplementationAgent } = require('./server/agents/implementation-agent');
          const { runVerificationAgent } = require('./server/agents/verification-agent');
          const { runIntegrationAgent } = require('./server/agents/integration-agent');

          async function run() {
            await db.initializeDatabase();
            console.log('[GH Actions] Running Phase 10 agent cycle...');
            await runDiagnosticAgent();
            await runPlanningAgent();
            await runImplementationAgent();
            await runVerificationAgent();
            await runIntegrationAgent();
            console.log('[GH Actions] ✅ Cycle complete');
            process.exit(0);
          }
          run().catch(err => { console.error(err); process.exit(1); });
          "

      - name: Run tests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NODE_ENV: test
        run: cd server && npm test -- --passWithNoTests 2>&1 || true
